<!DOCTYPE html>
<html>
<head>
    <title>Prime Check</title>
</head>
<body>
 
<h2>Check Browser Console Output</h2>
 
<script> 
var num = 29;
var isPrime = true;
 
for (var i = 2; i < num; i++) {
  if (num % i === 0) {
    isPrime = false;
    break;
  }
}
 
if (isPrime) {
  console.log(num + " is a prime number.");
} else {
  console.log(num + " is not a prime number.");
}
</script> <!--Check whether prime number-->

<script>
  //largest number checker
  var num1 = 15;
  var num2 = 22;
  var num3 = 8;

  var largest = num1;
  if (num2 > largest) {
    largest = num2;
  }
  if (num3 > largest) {
    largest = num3;
  }
  console.log("The largest number (out of 15, 22, 8) is: " + largest);

  //factorial of 5
  var num = 5;
  var factorial = 1;
  for (var i = num; i > 0; i--) {
    factorial *= i;
  }
  console.log("Factorial of " + num + " is: " + factorial);
</script><!--Largest number checker and factorial of 5-->

<script>
  var str = "JavaScript";
  var reversedStr = "";
  for (var i = str.length - 1; i >= 0; i--) {
    reversedStr += str[i];
  }
  console.log("Reversed string is: " + reversedStr);
</script> <!--Reverse string 'Javascript'-->

<script>
  var arr = [1, 2, 3, 4, 5];
  var sum = 0;
  for (var i = 0; i < arr.length; i++) {
    sum += arr[i];
  }
  console.log("Sum of array elements: " + sum);
</script> <!--Sum of an array of elements-->

<script>
  var arr = [1, 2, 3, 4, 5];
  // Add an element to the end of the array
  arr.push(6);
  // Remove the first element
  arr.shift();
  console.log("Modified array: " + arr);
</script><!--Modify array-->

<script>
  var person = {
  name: "Alice",
  age: 30
  };
  console.log("Name: " + person.name);
  console.log("Age: " + person.age);
</script><!--Simple object-->
 
</body>
</html>
