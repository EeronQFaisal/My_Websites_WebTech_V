<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List DOM Practice</title>
    <link rel="stylesheet" href="CSS_Files/dom.css">
</head>
<body>
    <h1>Student List</h1>
    <!-- Student Form -->
    <form id="student-form">
        <label for="student-name">Student Name:</label>
        <input type="text" id="student-name" placeholder="Enter student name">
        <label for="student-roll">Roll No.:</label>
        <input type="number" id="student-roll" placeholder="Enter roll number">
        <button type="submit">Add Student</button>
    </form>
    <!-- Student List -->
    <ul id="student-list">
    <!-- New students will be added here -->
    </ul>
    <!-- JS file -->
    <script src="JS_Files/dom.js"></script>
</body>
</html>
